<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PN Workflow</title>

<style>

*{box-sizing:border-box}

:root{
--bg:#f5f6f8;
--panel:#ffffff;
--border:#d9dee5;
--text:#1f2937;
--muted:#6b7280;
--accent:#2f6fed;
--danger:#c62828;
}

body{
margin:0;
font-family:Segoe UI,Roboto,Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

/* TOP BAR */

.topbar{
height:42px;
background:#ffffff;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
font-size:13px;
}

.title{
font-weight:600;
}

.menu button{
border:1px solid var(--border);
background:white;
padding:4px 10px;
font-size:12px;
border-radius:4px;
cursor:pointer;
margin-left:6px;
}

.menu button:hover{
background:#f3f4f6;
}

/* MAIN */

.main{
padding:20px;
max-width:900px;
margin:auto;
}

/* INPUT BAR */

.addbar{
display:flex;
gap:8px;
margin-bottom:18px;
}

.addbar input{
height:30px;
padding:4px 8px;
border:1px solid var(--border);
border-radius:4px;
font-size:13px;
width:240px;
}

.addbar button{
height:30px;
padding:0 14px;
background:#2f6fed;
color:white;
border:none;
border-radius:4px;
font-size:13px;
cursor:pointer;
}

.addbar button:hover{
opacity:0.9;
}

/* CARD */

.card{
background:white;
border:1px solid var(--border);
border-radius:6px;
padding:10px 14px;
margin-bottom:10px;
position:relative;
}

/* TITLE */

.card-title{
font-weight:600;
font-size:13px;
margin-bottom:6px;
}

/* REMOVE BUTTON */

.remove{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
border:none;
background:#f3f4f6;
color:#444;
font-size:11px;
padding:3px 8px;
border-radius:4px;
cursor:pointer;
}

.remove:hover{
background:#e5e7eb;
}

/* STEP LIST */

.step{
display:flex;
align-items:center;
gap:6px;
font-size:12.5px;
padding:2px 0;
}

.step input{
cursor:pointer;
}

.step.done{
text-decoration:line-through;
color:#9ca3af;
}

/* PROGRESS */

.progress{
font-size:11px;
color:var(--muted);
margin-top:6px;
}

/* EMPTY */

.empty{
text-align:center;
color:#9ca3af;
font-size:13px;
margin-top:30px;
}

</style>
</head>

<body>

<div class="topbar">

<div class="title">PN Workflow</div>

<div class="menu">
<button onclick="openMain()">Main Panel</button>
<button onclick="location.reload()">Workflows</button>
<button onclick="goVerify()">Verify</button>
</div>

</div>

<div class="main">

<div class="addbar">
<input id="pnInput" placeholder="Enter Part Number">
<button onclick="addPN()">Add</button>
</div>

<div id="workflowList"></div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwQSWolwtmtnifFqiDmMcHCnKcmSmfDibNfqdWClPKnNK0sEUP5q-Z7Q42IWxJg47zK/exec"

let workflows={};

const stepsTemplate=[
"Search Google Sheets",
"Main Platforms (Stockmarket / Partbase / B2B / Locatory)",
"Other Platforms (AJW / Satair / etc)",
"Ask Manufacturer",
"Search Google",
"Ask Co-workers"
]

// Load from Google Sheets
async function loadWorkflow(){
    try{
        const res = await fetch(API_URL+"?sheet=WorkflowTasks");
        const data = await res.json();
        workflows = {};
        data.forEach(row => {
            workflows[row.pn] = {steps: JSON.parse(row.steps)};
        });
        render();
    }catch(err){
        console.error("Failed to load workflow:", err);
    }
}

// Save to Google Sheets
async function saveWorkflow(){
    const data = Object.keys(workflows).map(pn => ({
        pn,
        steps: JSON.stringify(workflows[pn].steps)
    }));
    try{
        await fetch(API_URL,{
            method:"POST",
            body: JSON.stringify({sheet:"WorkflowTasks", payload:data})
        });
    }catch(err){
        console.error("Failed to save workflow:", err);
    }
}

async function init(){
    await loadWorkflow();
}

init();

function openMain(){
    window.location.href="index.html"
}

function goVerify(){
    window.location.href="verify.html"
}

/* ADD SINGLE PN */
function addPN(){
    const pn=document.getElementById("pnInput").value.trim();
    if(!pn) return;

    if(!workflows[pn]){
        workflows[pn]={
            steps:stepsTemplate.map(s=>({text:s,done:false}))
        }
    }

    document.getElementById("pnInput").value="";
    saveWorkflow();
    render();
}

/* CHECK STEP */
function toggleStep(pn,index){
    let step=workflows[pn].steps[index];
    step.done=!step.done;
    saveWorkflow();
    render();
}

/* REMOVE CARD */
function removeCard(pn){
    delete workflows[pn];
    saveWorkflow();
    render();
}

/* RENDER */
function render(){
    const container=document.getElementById("workflowList");
    container.innerHTML="";

    if(Object.keys(workflows).length===0){
        container.innerHTML='<div class="empty">No workflows yet</div>';
        return;
    }

    for(let pn in workflows){
        const data=workflows[pn];
        const card=document.createElement("div");
        card.className="card";

        let html=`<div class="card-title">${pn}</div>`;

        data.steps.forEach((step,i)=>{
            let checked=step.done?"checked":"";
            let doneClass=step.done?"step done":"step";

            html+=`
            <div class="${doneClass}">
                <input type="checkbox" ${checked} onclick="toggleStep('${pn}',${i})">
                <div>${step.text}</div>
            </div>`;
        });

        let doneCount=data.steps.filter(s=>s.done).length;
        html+=`<div class="progress">${doneCount} / ${stepsTemplate.length} completed</div>`;
        html+=`<button class="remove" onclick="removeCard('${pn}')">Remove</button>`;

        card.innerHTML=html;
        container.appendChild(card);
    }
}
</script>
</body>
</html>
