<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PN Workflow</title>

<style>

*{box-sizing:border-box}

:root{
--bg:#f4f6f8;
--panel:#fbfcfe;
--border:#dde3ea;
--text-main:#1e293b;
--text-muted:#64748b;
--primary:#3b82f6;
--danger:#a11a1a;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg);
color:var(--text-main);
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
background:var(--panel);
border-bottom:1px solid var(--border);
padding:14px 24px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{font-weight:600;font-size:16px}

.menu button{
border:1px solid var(--border);
background:var(--panel);
padding:7px 12px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.main{
padding:28px;
overflow:auto;
flex:1;
}

/* ADD BAR */

.addbar{
display:flex;
gap:10px;
margin-bottom:20px;
}

.addbar input{
padding:10px;
border:1px solid var(--border);
border-radius:6px;
font-size:14px;
width:320px;
}

.addbar button{
background:var(--primary);
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

/* CARD */

.card{
background:var(--panel);
border:1px solid var(--border);
border-left:4px solid var(--primary);
border-radius:8px;
padding:16px;
margin-bottom:14px;
position:relative;
}

.card-title{
font-weight:600;
margin-bottom:10px;
font-size:14px;
}

/* REMOVE BUTTON */

.remove{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
background:#ef4444;
color:white;
border:none;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
font-size:12px;
}

/* STEPS */

.step{
display:flex;
align-items:center;
gap:10px;
padding:6px 0;
font-size:13px;
}

.step.done{
text-decoration:line-through;
color:#9ca3af;
}

/* PROGRESS */

.progress{
font-size:12px;
color:var(--text-muted);
margin-top:8px;
}

.empty{
text-align:center;
color:#6b7280;
margin-top:40px;
}

</style>
</head>

<body>

<div class="topbar">

<div class="title">PN Workflow</div>

<div class="menu">
<button onclick="openMain()">Main Panel</button>
<button onclick="location.reload()">Workflows</button>
</div>

</div>

<div class="main">

<div class="addbar">
<input id="pnInput" placeholder="Enter PN (multiple allowed)">
<button onclick="addPN()">Add</button>
</div>

<div id="workflowList"></div>

</div>

<script>

const stepsTemplate=[
"Search on Google Sheets",
"Main Platform (Stockmarket / Partbase / B2B / Locatory)",
"Other Platforms (AJW / Satair / etc)",
"Ask Manufacturer",
"Search on Google",
"Ask Co-workers"
]

let workflows=JSON.parse(localStorage.getItem("pnWorkflowData")||"{}")

function save(){
localStorage.setItem("pnWorkflowData",JSON.stringify(workflows))
}

function openMain(){
window.location.href="index.html"
}

/* ADD MULTIPLE PN */

function addPN(){

const raw=document.getElementById("pnInput").value.trim()

if(!raw)return

const parts=raw.split(/[\s,]+/)

parts.forEach(pn=>{

pn=pn.trim()

if(!pn)return

if(!workflows[pn]){

workflows[pn]={
steps:stepsTemplate.map(s=>({text:s,done:false}))
}

}

})

document.getElementById("pnInput").value=""

save()

render()

}

/* CHECK STEP */

function toggleStep(pn,index){

let step=workflows[pn].steps[index]

step.done=!step.done

save()

render()

}

/* REMOVE CARD */

function removeCard(pn){

delete workflows[pn]

save()

render()

}

function render(){

const container=document.getElementById("workflowList")

container.innerHTML=""

if(Object.keys(workflows).length===0){

container.innerHTML='<div class="empty">No workflows yet</div>'
return
}

for(let pn in workflows){

const data=workflows[pn]

const card=document.createElement("div")
card.className="card"

let html=`<div class="card-title">${pn}</div>`

data.steps.forEach((step,i)=>{

let checked=step.done?"checked":""
let doneClass=step.done?"step done":"step"

html+=`
<div class="${doneClass}">
<input type="checkbox" ${checked} onclick="toggleStep('${pn}',${i})">
<div>${step.text}</div>
</div>
`

})

let doneCount=data.steps.filter(s=>s.done).length

html+=`<div class="progress">Progress: ${doneCount} / 6</div>`

html+=`<button class="remove" onclick="removeCard('${pn}')">Remove</button>`

card.innerHTML=html

container.appendChild(card)

}

}

render()

</script>

</body>
</html>
